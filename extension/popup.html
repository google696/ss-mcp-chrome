<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SS MCP Chrome</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="app-header">
        <img src="icons/icon-48.png" alt="">
        <div>
          <h1>SS MCP Chrome</h1>
          <p class="status-line">
            <span id="statusLight" class="status-light disconnected"></span>
            <span id="status">正在检查...</span>
          </p>
        </div>
      </header>

      <p id="detail"></p>

      <section class="connection">
        <button id="connectionButton" type="button">连接</button>
        <a href="https://github.com/google696/ss-mcp-chrome" target="_blank" rel="noreferrer">github.com/google696/ss-mcp-chrome</a>
      </section>

      <section class="quick-actions">
        <button id="nativeStart" type="button">启动本地服务</button>
        <button id="saveScreenshot" type="button">保存截图</button>
        <button id="pickSelector" type="button">选择元素</button>
      </section>
      <p id="toolMessage" class="tool-message"></p>

      <section class="settings-panel">
        <div class="section-title">
          <h2>设置</h2>
          <button id="copyConfig" type="button">复制配置</button>
        </div>
        <label>
          WebSocket 地址
          <input id="wsUrl" type="text" autocomplete="off">
        </label>
        <label>
          调试 HTTP 地址
          <input id="debugHttpUrl" type="text" autocomplete="off">
        </label>
        <label>
          Native Host 名称
          <input id="nativeHostName" type="text" autocomplete="off">
        </label>
        <label class="checkline">
          <input id="autoConnect" type="checkbox">
          自动重连
        </label>
        <button id="saveSettings" type="button">保存设置</button>
      </section>

      <section class="diagnostics-panel">
        <div class="section-title">
          <h2>连接诊断</h2>
          <button id="runDiagnostics" type="button">检查</button>
        </div>
        <div id="diagnosticsList" class="diagnostics-list"></div>
      </section>

      <section class="scripts-header">
        <h2>脚本</h2>
        <button id="newScript" type="button">新建</button>
      </section>

      <section id="scriptList" class="script-list"></section>

      <form id="editor" class="editor" hidden>
        <div class="editor-title">
          <strong id="editorTitle">新建脚本</strong>
          <button id="closeEditor" type="button">关闭</button>
        </div>

        <label>
          名称
          <input id="scriptName" type="text" autocomplete="off" placeholder="脚本名称">
        </label>

        <label>
          源码
          <textarea id="scriptSource" spellcheck="false"></textarea>
        </label>

        <p id="editorMessage"></p>

        <div class="editor-actions">
          <button id="saveScript" type="submit">保存</button>
          <button id="runScript" type="button">运行</button>
          <button id="deleteScript" type="button">删除</button>
        </div>
      </form>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
